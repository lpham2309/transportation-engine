version: 2

models:
  - name: fct_mbta_route_reliability
    description: Reliability scores and metrics for MBTA routes
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - stop_h3_index
            - route_id
            - hour_bucket
            - day_type
            - weather_condition
    columns:
      - name: reliability_score
        description: Composite reliability score (0-100)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100

      - name: on_time_score
        description: On-time performance score
        tests:
          - not_null

      - name: stability_score
        description: Travel time stability score
        tests:
          - not_null

      - name: transit_volatility_cv
        description: Coefficient of variation (%)
        tests:
          - not_null

      - name: trip_count
        description: Number of observations
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 30"
              config:
                severity: warn

      - name: reliability_category
        description: Reliability classification
        tests:
          - not_null
          - accepted_values:
              values: ['highly_reliable', 'moderately_reliable', 'unreliable', 'very_unreliable']

  - name: fct_driving_route_reliability
    description: Reliability scores and metrics for driving routes
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - origin_h3_index
            - destination_h3_index
            - hour_bucket
            - day_type
            - weather_condition
    columns:
      - name: reliability_score
        description: Composite reliability score (0-100)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100

      - name: median_duration_min
        description: Median travel time in minutes
        tests:
          - not_null

      - name: recommended_buffer_min
        description: Recommended time buffer (P90)
        tests:
          - not_null

      - name: avg_traffic_impact_pct
        description: Average traffic impact percentage
        tests:
          - not_null

  - name: fct_mode_comparison
    description: Side-by-side comparison of MBTA and Driving
    columns:
      - name: transportation_mode
        description: Mode of transportation
        tests:
          - not_null
          - accepted_values:
              values: ['MBTA', 'Driving']

      - name: most_reliable_mode
        description: Mode with highest reliability for this scenario
        tests:
          - not_null

      - name: fastest_mode
        description: Mode with lowest median time
        tests:
          - not_null

      - name: is_recommended
        description: Recommended mode based on composite criteria

  - name: fct_weather_impact
    description: Analysis of weather impact on transportation reliability
    columns:
      - name: weather_condition
        description: Weather condition
        tests:
          - not_null
          - accepted_values:
              values: ['clear', 'rain', 'snow']

      - name: reliability_delta_from_clear
        description: Change in reliability vs clear weather

      - name: time_delta_from_clear_min
        description: Change in travel time vs clear weather (minutes)

      - name: weather_impact_category
        description: Severity of weather impact
        tests:
          - accepted_values:
              values: ['minimal_impact', 'minor_impact', 'moderate_impact', 'major_impact']