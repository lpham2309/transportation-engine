version: 2

sources:
  - name: boston_reliability_bronze
    description: Bronze layer tables for Boston Reliability Engine
    schema: "{{ env_var('STUDENT_SCHEMA', 'lpham08') }}"
    tables:
      - name: bronze_mbta_predictions
        description: Real-time MBTA predictions with H3 indexing
        columns:
          - name: prediction_id
            description: Unique prediction identifier
          - name: arrival_time
            description: Predicted arrival time
          - name: stop_h3_index
            description: H3 hexagon (resolution 8) for stop location
          - name: route_id
            description: MBTA route identifier
          - name: fetched_at
            description: Timestamp when data was fetched

      - name: bronze_mbta_schedules
        description: MBTA scheduled arrivals with H3 indexing
        columns:
          - name: schedule_id
            description: Unique schedule identifier
          - name: arrival_time
            description: Scheduled arrival time
          - name: schedule_date
            description: Date of scheduled service
          - name: stop_h3_index
            description: H3 hexagon (resolution 8) for stop location
          - name: route_id
            description: MBTA route identifier

      - name: bronze_noaa_weather
        description: Daily weather observations from Boston Logan Airport
        columns:
          - name: observation_date
            description: Date of weather observation (PRIMARY KEY)
          - name: weather_condition
            description: Categorized weather (clear/rain/snow)
          - name: precipitation_inches
            description: Daily precipitation amount
          - name: temp_max_f
            description: Maximum temperature in Fahrenheit
          - name: temp_min_f
            description: Minimum temperature in Fahrenheit

      - name: bronze_driving_routes
        description: Google Maps driving times with traffic
        columns:
          - name: route_name
            description: Human-readable route name
          - name: origin_h3_index
            description: H3 hexagon for origin
          - name: destination_h3_index
            description: H3 hexagon for destination
          - name: duration_in_traffic_seconds
            description: Travel time with traffic
          - name: fetched_date
            description: Date when data was fetched
